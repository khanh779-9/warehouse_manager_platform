<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Cập nhật Sản phẩm</title>
</head>
<body>

<div layout:fragment="content" class="container-fluid p-4">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold mb-0">Cập nhật Sản phẩm</h3>
                <a th:href="@{/products}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i> Quay lại danh sách
                </a>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/products/edit/{id}(id=${product_id})}" th:object="${productDTO}" method="post">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="sku" class="form-label fw-semibold">Mã SKU <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="sku" th:field="*{sku}" placeholder="Nhập mã SKU (VD: SP-001)" required>
                            </div>
                            <div class="col-md-6">
                                <label for="productName" class="form-label fw-semibold">Tên sản phẩm <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="productName" th:field="*{productName}" placeholder="Nhập tên sản phẩm" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="categoryId" class="form-label fw-semibold">Danh mục <span class="text-danger">*</span></label>
                                <select class="form-select" id="categoryId" th:field="*{categoryId}" required>
                                    <option value="0" disabled>-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.categoryName}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="unitId" class="form-label fw-semibold">Đơn vị tính <span class="text-danger">*</span></label>
                                <select class="form-select" id="unitId" th:field="*{unitId}" required>
                                    <option value="0" disabled>-- Chọn đơn vị --</option>
                                    <option th:each="unit : ${units}" th:value="${unit.unitId}" th:text="${unit.unitName}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="minStock" class="form-label fw-semibold">Tồn kho tối thiểu</label>
                                <input type="number" step="0.01" class="form-control" id="minStock" th:field="*{minStock}" placeholder="0.00">
                                <div class="form-text">Hệ thống sẽ cảnh báo khi tồn kho dưới mức này.</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-semibold">Mô tả chi tiết</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="4" placeholder="Nhập mô tả sản phẩm..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2 border-top pt-3">
                            <a th:href="@{/products}" class="btn btn-light border">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary d-flex align-items-center gap-2">
                                <i class="bi bi-save"></i> Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
