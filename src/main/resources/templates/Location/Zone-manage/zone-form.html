<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout(~{::title}, ~{::#mainContent})}">
<head>
    <title th:text="${zone != null and zone.zoneId != null ? 'Cập nhật zones' : 'Thêm zones'}">Zone</title>
</head>
<body>
<div id="mainContent">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/warehouses/locations}">Vị trí kho</a></li>
            <li class="breadcrumb-item active"
                th:text="${zone != null and zone.zoneId != null ? 'Cập nhật zones' : 'Thêm zones'}">
                Thêm zones
            </li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0 fw-bold text-primary">
                <i class="fa-solid fa-layer-group me-2"></i>
                <span th:text="${zone != null and zone.zoneId != null ? 'Chỉnh sửa khu vực / Zone' : 'Tạo khu vực / Zone mới'}">
                    Tạo zone mới
                </span>
            </h5>
        </div>

        <div class="card-body p-4">
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <form th:action="${zone != null and zone.zoneId != null} ? @{/warehouses/manage/zones/update} : @{/warehouses/manage/zones/save}"
                  th:object="${zone}" method="post">

                <input type="hidden" th:field="*{zoneId}"/>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Kho</label>
                        <select class="form-select" th:field="*{warehouseId}">
                            <option value="">-- Chọn kho --</option>
                            <option th:each="w : ${warehouses}"
                                    th:value="${w.warehouseId}"
                                    th:text="${w.warehouseName}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Mã khu vực</label>
                        <input type="text" class="form-control" th:field="*{zoneCode}" placeholder="Ví dụ: ZONE-LX-A">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-bold">Tên khu vực</label>
                        <input type="text" class="form-control" th:field="*{zoneName}" placeholder="Ví dụ: Khu A - Kho Long Xuyên">
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>
                        <span th:text="${zone != null and zone.zoneId != null ? 'Cập nhật' : 'Xác nhận thêm'}">
                            Xác nhận thêm
                        </span>
                    </button>
                    <a th:href="@{/warehouses/locations}" class="btn btn-outline-secondary px-4">Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
