<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout(~{::title}, ~{::#mainContent})}">
<head>
    <title th:text="${warehouse != null and warehouse.warehouseId > 0 ? 'Cập nhật kho' : 'Thêm kho'}">Kho</title>
</head>
<body>
<div id="mainContent">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/warehouses/locations}">Vị trí kho</a></li>
            <li class="breadcrumb-item active"
                th:text="${warehouse != null and warehouse.warehouseId > 0 ? 'Cập nhật kho' : 'Thêm kho'}">
                Thêm kho
            </li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0 fw-bold text-primary">
                <i class="fa-solid fa-warehouse me-2"></i>
                <span th:text="${warehouse != null and warehouse.warehouseId > 0 ? 'Chỉnh sửa kho' : 'Tạo kho mới'}">
                    Tạo kho mới
                </span>
            </h5>
        </div>

        <div class="card-body p-4">
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <form th:action="${warehouse != null and warehouse.warehouseId > 0} ? @{/warehouses/manage/update} : @{/warehouses/manage/save}"
                  th:object="${warehouse}" method="post">

                <input type="hidden" th:field="*{warehouseId}"/>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Mã kho</label>
                        <input type="text" class="form-control" th:field="*{warehouseCode}" placeholder="Ví dụ: WH-LX-01">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tên kho</label>
                        <input type="text" class="form-control" th:field="*{warehouseName}" placeholder="Ví dụ: Kho Long Xuyên">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-bold">Địa chỉ kho</label>
                        <input type="text" class="form-control" th:field="*{warehouseAddress}" placeholder="Nhập địa chỉ kho">
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>
                        <span th:text="${warehouse != null and warehouse.warehouseId > 0 ? 'Cập nhật' : 'Xác nhận thêm'}">
                            Xác nhận thêm
                        </span>
                    </button>
                    <a th:href="@{/warehouses/locations}" class="btn btn-outline-secondary px-4">Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
