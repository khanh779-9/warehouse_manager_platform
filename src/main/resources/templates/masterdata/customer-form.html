

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout(~{::title}, ~{::#mainContent})}">
<head>
    <title th:text="${isEdit} ? 'Cập nhật khách hàng' : 'Thêm mới khách hàng'">Khách hàng</title>
</head>
<body>
<div id="mainContent">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/customers}">Khách hàng</a></li>
            <li class="breadcrumb-item active" th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0 fw-bold text-primary">
                <i class="fa-solid fa-user-group me-2"></i>
                <span th:text="${isEdit} ? 'Chỉnh sửa khách hàng' : 'Tạo khách hàng mới'"></span>
            </h5>
        </div>

        <div class="card-body p-4">
            <form th:action="${isEdit} ? @{/customers/edit} : @{/customers/add}"
                  th:object="${customerRequest}" method="post">

                <input type="hidden" th:if="${isEdit}" th:field="*{customerId}"/>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Mã khách hàng</label>
                        <input type="text" class="form-control" th:field="*{customerCode}" placeholder="KH001">
                        <div class="text-danger mt-1 small"
                             th:if="${#fields.hasErrors('customerCode')}" th:errors="*{customerCode}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tên khách hàng</label>
                        <input type="text" class="form-control" th:field="*{customerName}" placeholder="Công ty ABC">
                        <div class="text-danger mt-1 small"
                             th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Người liên hệ</label>
                        <input type="text" class="form-control" th:field="*{contactPerson}" placeholder="Nguyễn Văn A">
                        <div class="text-danger mt-1 small"
                             th:if="${#fields.hasErrors('contactPerson')}" th:errors="*{contactPerson}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Điện thoại</label>
                        <input type="text" class="form-control" th:field="*{phone}" placeholder="0912345678">
                        <div class="text-danger mt-1 small"
                             th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" placeholder="customer@example.com">
                        <div class="text-danger mt-1 small"
                             th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Địa chỉ</label>
                        <textarea class="form-control" rows="3" th:field="*{address}" placeholder="Địa chỉ khách hàng"></textarea>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>
                        <span th:text="${isEdit} ? 'Cập nhật' : 'Xác nhận thêm'"></span>
                    </button>
                    <a th:href="@{/customers}" class="btn btn-outline-secondary px-4">Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
