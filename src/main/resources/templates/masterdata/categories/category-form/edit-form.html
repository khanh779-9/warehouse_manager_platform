<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout(~{::title}, ~{::#mainContent})}">
<head>
    <title>Cập nhật Danh Mục</title>
</head>
<body>
<div id="mainContent">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold mb-0">Cập nhật Danh Mục</h3>
                <a th:href="@{/categories}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i> Quay lại danh sách
                </a>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/categories/edit/{id}(id=${category.categoryId})}" th:object="${categoryDTO}" method="post">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="code" class="form-label fw-semibold">Category Code</label>
                                <input type="text" class="form-control" id="code" th:field="*{categoryCode}"
                                       placeholder="Nhập mã Danh Mục" required>
                            </div>
                            <div class="col-md-6">
                                <label for="categoryName" class="form-label fw-semibold">Tên danh mục <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="categoryName" th:field="*{categoryName}"
                                       placeholder="Nhập tên Danh Mục" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 border-top pt-3">
                            <a th:href="@{/categories}" class="btn btn-light border">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary d-flex align-items-center gap-2">
                                <i class="bi bi-save"></i> Cập nhật
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
