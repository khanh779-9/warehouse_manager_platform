<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout(~{::title}, ~{::#mainContent})}">
<head>
    <title>Quản lý công ty</title>
</head>
<body>
<div id="mainContent">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1"><i class="fa-regular fa-building"></i> Quản lý công ty</h2>
            <p class="text-muted mb-0">Danh sách thông tin công ty trong hệ thống</p>
        </div>
        <a th:href="@{/companies/add}" class="btn btn-primary d-flex align-items-center gap-2">
            <i class="bi bi-plus-circle"></i> Thêm mới
        </a>
    </div>

    <form th:action="@{/companies}" method="get" class="mb-3">
        <div class="input-group" style="max-width: 520px;">
            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
            <input type="text" name="keyword" class="form-control"
                   placeholder="Tìm theo tên công ty, MST, điện thoại, email, địa chỉ..."
                   th:value="${keyword}">
            <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            <a th:href="@{/companies}" class="btn btn-outline-secondary">Reset</a>
        </div>
    </form>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Tên công ty</th>
                        <th>Mã số thuế</th>
                        <th>Địa chỉ</th>
                        <th>Điện thoại</th>
                        <th>Email</th>
                        <th class="text-center pe-4">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(companies)}">
                        <td colspan="7" class="text-center text-muted py-4">Chưa có dữ liệu công ty</td>
                    </tr>

                    <tr th:each="c : ${companies}">
                        <td class="ps-4" th:text="${c.companyId}"></td>
                        <td class="fw-semibold" th:text="${c.companyName}"></td>
                        <td th:text="${c.taxCode}"></td>
                        <td th:text="${c.address}"></td>
                        <td th:text="${c.phone}"></td>
                        <td th:text="${c.email}"></td>
                        <td class="text-center pe-4">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/companies/edit/{id}(id=${c.companyId})}" class="btn btn-sm btn-outline-warning">
                                    <i class="bi bi-pencil"></i> Sửa
                                </a>

                                <form th:action="@{/companies/delete/{id}(id=${c.companyId})}" method="post"
                                      onsubmit="return confirm('Bạn có chắc chắn muốn xóa công ty này?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i> Xóa
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
