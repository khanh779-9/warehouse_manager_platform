<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout(~{::title}, ~{::#mainContent})}">
<head>
    <title>Quản lý nhà cung cấp</title>
</head>
<body>
<div id="mainContent">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1"><i class="fa-solid fa-users"></i> Quản lý nhà cung cấp</h2>
            <p class="text-muted mb-0">Danh sách nhà cung cấp trong hệ thống</p>
        </div>
        <a th:href="@{/suppliers/add}" class="btn btn-primary d-flex align-items-center gap-2">
            <i class="bi bi-plus-circle"></i> Thêm mới
        </a>
    </div>

    <form th:action="@{/suppliers}" method="get" class="mb-3">
        <div class="input-group" style="max-width: 520px;">
            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
            <input type="text" name="keyword" class="form-control"
                   placeholder="Tìm theo mã NCC, tên NCC, người liên hệ, số điện thoại..."
                   th:value="${keyword}">
            <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            <a th:href="@{/suppliers}" class="btn btn-outline-secondary">Reset</a>
        </div>
    </form>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Mã NCC</th>
                        <th>Tên nhà cung cấp</th>
                        <th>Người liên hệ</th>
                        <th>Điện thoại</th>
                        <th>Email</th>
                        <th>Trạng thái</th>
                        <th class="text-center pe-4">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(suppliers)}">
                        <td colspan="8" class="text-center text-muted py-4">Chưa có dữ liệu nhà cung cấp</td>
                    </tr>

                    <tr th:each="s : ${suppliers}">
                        <td class="ps-4" th:text="${s.supplierId}"></td>
                        <td th:text="${s.supplierCode}"></td>
                        <td class="fw-semibold" th:text="${s.supplierName}"></td>
                        <td th:text="${s.contactPerson}"></td>
                        <td th:text="${s.phone}"></td>
                        <td th:text="${s.email}"></td>
                        <td>
                            <span th:if="${s.active}" class="badge bg-success-subtle text-success">Đang hoạt động</span>
                            <span th:if="${!s.active}" class="badge bg-secondary-subtle text-secondary">Ngừng hoạt động</span>
                        </td>
                        <td class="text-center pe-4">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/suppliers/edit/{id}(id=${s.supplierId})}" class="btn btn-sm btn-outline-warning">
                                    <i class="bi bi-pencil"></i> Sửa
                                </a>
                                <form th:action="@{/suppliers/delete/{id}(id=${s.supplierId})}" method="post"
                                      onsubmit="return confirm('Bạn có chắc chắn muốn xóa nhà cung cấp này?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i> Xóa
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
