<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout(~{::title}, ~{::#mainContent})}">
<head>
    <title>Cập nhật người dùng</title>
</head>
<body>
<div id="mainContent">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/users}">Người dùng</a></li>
            <li class="breadcrumb-item active">Chỉnh sửa</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0 fw-bold text-warning">
                <i class="bi bi-pencil-square me-2"></i>Cập nhật thông tin
            </h5>
        </div>
        <div class="card-body p-4">
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <form th:action="@{/admin/users/edit}" th:object="${userRequest}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{userId}">

                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Thay đổi ảnh đại diện</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                        <small class="text-muted">Để trống nếu muốn giữ ảnh cũ</small>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Họ và tên</label>
                        <input type="text" class="form-control" th:field="*{fullName}"
                               th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{fullName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Số điện thoại</label>
                        <input type="text" class="form-control" th:field="*{phone}"
                               th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{phone}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Số CCCD</label>
                        <input type="text" class="form-control" th:field="*{cccd}"
                               th:classappend="${#fields.hasErrors('cccd')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{cccd}"></div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">Giới tính</label>
                        <select th:field="*{gender}" class="form-select">
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">Ngày sinh</label>
                        <input type="date" class="form-control" th:field="*{dateOfBirth}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">Vai trò</label>
                        <select th:field="*{roleId}" class="form-select">
                            <option th:each="r : ${roles}" th:value="${r.roleId}" th:text="${r.roleName}"></option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">Trạng thái</label>
                        <select th:field="*{status}" class="form-select">
                            <option value="ACTIVE">Hoạt động</option>
                            <option value="INACTIVE">Tạm khóa</option>
                        </select>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-bold">Mật khẩu mới</label>
                        <input type="password" class="form-control" th:field="*{password}"
                               placeholder="Để trống nếu không muốn thay đổi">
                        <div class="invalid-feedback" style="display: block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="col-12 mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-warning px-4 fw-bold">
                            <i class="bi bi-save me-2"></i>Cập nhật ngay
                        </button>
                        <a th:href="@{/admin/users}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
