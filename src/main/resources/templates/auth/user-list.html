<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout(~{::title}, ~{::#mainContent})}">
<head>
    <title>Quản lý người dùng</title>
</head>
<body>
<div id="mainContent">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1"><i class="bi bi-people"></i> Quản lý người dùng</h2>
            <p class="text-muted mb-0">Danh sách tài khoản hệ thống</p>
        </div>
        <a th:href="@{/admin/users/add}" class="btn btn-primary d-flex align-items-center gap-2">
            <i class="bi bi-person-plus"></i> Thêm mới
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                    <tr>
                        <th class="ps-4">Avatar</th>
                        <th>Tài khoản</th>
                        <th>Họ và tên</th>
                        <th>Email</th>
                        <th>Số điện thoại</th>
                        <th>Vai trò</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td class="ps-4">
                            <img th:src="${user.avatar}"
                                 class="rounded-circle border" width="40" height="40"
                                 style="object-fit: cover;"
                                 onerror="this.src='/assets/images/default-avatar.png'">
                        </td>
                        <td><span class="fw-bold text-primary" th:text="${user.username}"></span></td>

                        <td th:text="${user.fullName ?: 'N/A'}"></td>
                        <td th:text="${user.email ?: 'N/A'}"></td>
                        <td th:text="${user.phone ?: 'N/A'}"></td>
                        <td>
        <span class="badge bg-info-subtle text-info border border-info-subtle px-3"
              th:text="${user.roleName ?: 'USER'}"></span>
                        </td>
                        <td class="text-center pe-4">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:if="${user.userId != null}"
                                   th:href="@{/admin/users/edit/{id}(id=${user.userId})}" class="btn btn-sm btn-outline-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:if="${user.userId != null}"
                                   th:href="@{/admin/users/delete/{id}(id=${user.userId})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Xóa người dùng này?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
