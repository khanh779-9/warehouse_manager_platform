<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký hệ thống</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
        .is-invalid { border-color: #dc3545 !important; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4 text-primary fw-bold">Đăng Ký Tài Khoản</h3>

                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Tên đăng nhập</label>
                                <input type="text" th:field="*{username}"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                                       class="form-control" placeholder="nptthinh">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                     th:text="${#fields.errors('username')[2]}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <input type="password" th:field="*{password}"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                       class="form-control" placeholder="******">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                     th:text="${#fields.errors('password')[1]}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Họ và tên</label>
                            <input type="text" th:field="*{fullName}"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                                   class="form-control" placeholder="Nguyễn Văn A">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                       class="form-control" placeholder="abc@gmail.com">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Số điện thoại</label>
                                <input type="text" th:field="*{phone}"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                       class="form-control" placeholder="0xxxxxxxxx">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}"
                                     th:text="${#fields.errors('phone')[1]}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Số CCCD</label>
                            <input type="text" th:field="*{cccd}"
                                   th:classappend="${#fields.hasErrors('cccd')} ? 'is-invalid' : ''"
                                   class="form-control" placeholder="12 chữ số">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('cccd')}"
                                 th:text="${#fields.errors('cccd')[1]}"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Giới tính</label>
                            <select th:field="*{gender}"
                                    th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid' : ''"
                                    class="form-select">
                                <option value="">-- Chọn giới tính --</option>
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                                <option value="Khác">Khác</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Ngày sinh</label>
                            <input type="date" th:field="*{dateOfBirth}"
                                   th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid' : ''"
                                   class="form-control">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3 fw-bold">TẠO TÀI KHOẢN</button>

                        <div class="text-center">
                            <span class="text-muted">Đã có tài khoản? </span>
                            <a th:href="@{/auth/login}" class="text-decoration-none fw-bold">Đăng nhập ngay</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
