<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>

<div th:fragment="modal">
    <div class="modal fade" id="approvalModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0 px-4 pt-4">
                    <div>
                        <h4 class="fw-bold mb-1">Đối soát chứng từ: <span id="modalReceiptCode" class="text-primary"></span></h4>
                        <p class="text-muted small mb-0">Kiểm tra kỹ các hạng mục và ghi chú trước khi xác nhận.</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body p-4">
                    <form id="actionForm" method="post" action="">
                        <input type="hidden" name="note" id="formNote">
                        <input type="hidden" name="rejectAction" id="formRejectAction">
                    </form>

                    <div class="table-responsive border rounded-3">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                            <tr>
                                <th class="py-3 px-3">Sản phẩm / Mã Lô</th>
                                <th class="text-center">Vị trí Kệ</th>
                                <th class="text-end">Dự kiến (PO)</th>
                                <th class="text-end">Thực nhập</th>
                                <th class="text-center">Chênh lệch</th>
                            </tr>
                            </thead>
                            <tbody id="detailTableBody">
                            </tbody>
                        </table>
                    </div>

                    <div id="noteArea" class="mt-4">
                        <label class="form-label fw-bold text-muted small text-uppercase">Ghi chú duyệt đơn</label>
                        <textarea id="approvalNote" class="form-control bg-light border-0" rows="2" placeholder="Nhập lý do nếu có sai lệch hoặc từ chối..."></textarea>
                    </div>

                    <div id="rejectActionContainer" class="mt-3 p-3 bg-danger bg-opacity-10 border border-danger border-opacity-25 rounded-3" style="display: none;">
                        <label class="form-label fw-bold text-danger small text-uppercase">
                            <i class="bi bi-exclamation-triangle-fill me-1"></i> Hướng xử lý Đơn mua hàng (PO)
                        </label>
                        <select class="form-select border-danger text-danger fw-bold" id="rejectActionSelect">
                            <option value="KEEP_OPEN">Yêu cầu giao lại (Giữ PO ở trạng thái OPEN)</option>
                            <option value="CANCEL_PO">Hủy toàn bộ (Chuyển PO sang trạng thái REJECTED)</option>
                        </select>
                        <small class="text-danger mt-2 d-block opacity-75">
                            Lựa chọn này sẽ quyết định trạng thái của đơn hàng bên phân hệ Mua hàng (Procurement).
                        </small>
                    </div>


                </div>

                <div class="modal-footer border-0 px-4 pb-4 pt-0 justify-content-between">
                    <button type="button" id="btnReject" class="btn btn-light text-danger fw-bold rounded-pill px-4" onclick="rejectReceipt()">
                        <i class="bi bi-x-circle me-2"></i>Từ chối & Trả hàng
                    </button>

                    <div>
                        <button type="button" class="btn btn-outline-secondary fw-bold rounded-pill px-4 me-2" data-bs-dismiss="modal">Đóng</button>
                        <button type="button" id="btnApprove" class="btn btn-success fw-bold rounded-pill px-5 shadow-sm" onclick="approveReceipt()">
                            <i class="bi bi-check-circle me-2"></i>Xác nhận Phê Duyệt
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
