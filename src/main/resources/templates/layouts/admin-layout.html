<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">WMS Pr</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background-color: #374151; border-radius: 4px; }
        .nav-link:hover { color: #ffffff !important; background-color: rgba(255, 255, 255, 0.05); }
        .search-box .form-control:focus { box-shadow: none; border-color: #dee2e6; }
    </style>
</head>
<body class="d-flex vh-100 overflow-hidden">

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<main class="d-flex flex-column flex-grow-1 min-vh-100">
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

    <div class="flex-grow-1 p-4 overflow-y-auto">
        <th:block th:replace="${content}"></th:block>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
