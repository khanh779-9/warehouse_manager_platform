<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">WMS Pro</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* Làm card bo tròn hơn và đổ bóng mềm */
        .product-card {
            border-radius: 16px !important;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        /* Hiệu ứng zoom nhẹ khi hover */
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08) !important;
        }
        .product-card:hover img {
            transform: scale(1.05);
            transition: 0.5s;
        }
        .card-img-top { transition: 0.5s; }
        /* Chỉnh lại font chữ cho chuyên nghiệp */
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand text-primary fs-3" th:href="@{/}">WMS<span class="text-dark">PRO</span></a>

        <div class="d-flex align-items-center gap-3">
            <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                <a th:href="@{/auth/login}" class="btn btn-outline-primary px-4">Đăng nhập</a>
                <a th:href="@{/auth/register}" class="btn btn-primary px-4">Đăng ký</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="dropdown">
                <button class="btn btn-light dropdown-toggle border d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle fs-5"></i>
                    <span sec:authentication="name" class="fw-medium">User</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                    <li sec:authorize="hasAnyRole('ADMIN', 'MANAGER', 'STAFF')">
                        <a class="dropdown-item py-2" th:href="@{/admin/users}">
                            <i class="bi bi-speedometer2 me-2"></i> Hệ thống quản trị
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item text-danger py-2">
                                <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<main th:replace="${content}"></main>

<footer class="bg-white border-top py-4 mt-5">
    <div class="container text-center text-muted small">
        &copy; 2026 WMS Pro - Hệ thống quản lý kho thông minh.
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
